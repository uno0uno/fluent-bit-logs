[PARSER]
    Name        docker
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    # Docker adds stream (stdout/stderr) and log fields
    Decode_Field_As   escaped_utf8   log

[PARSER]
    Name        json_plain
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On
