[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020

# ──────────────────────────────────────────────
# INPUTS — tail all Docker container log files
# ──────────────────────────────────────────────
[INPUT]
    Name              tail
    Tag               docker.*
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    DB                /tmp/flb_docker.db
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    Refresh_Interval  10

# ──────────────────────────────────────────────
# FILTERS — enrich with container metadata
# ──────────────────────────────────────────────
[FILTER]
    Name                docker_metadata
    Match               docker.*
    Cache_TTL           60
    # Requires /var/run/docker.sock mounted

[FILTER]
    Name    record_modifier
    Match   docker.*
    Record  host ${HOSTNAME}

# ──────────────────────────────────────────────
# OUTPUT — PostgreSQL
# ──────────────────────────────────────────────
[OUTPUT]
    Name          pgsql
    Match         docker.*
    Host          ${POSTGRES_HOST}
    Port          ${POSTGRES_PORT}
    User          ${POSTGRES_USER}
    Password      ${POSTGRES_PASSWORD}
    Database      ${POSTGRES_DB}
    Table         container_logs
    Timestamp_Key time
    Async         false
